# 传感器配置文件
# Autonomous Driving Sensor Configuration

# ==================== 摄像头配置 ====================
cameras:
  # 前视长焦摄像头
  front_long:
    name: "front_long"
    type: "camera"
    resolution: [3840, 2160]  # 8M
    fps: 30
    fov: 30  # 视场角(度)
    position: [2.0, 0.0, 1.2]  # [x, y, z] 相对于车辆中心
    orientation: [0.0, 0.0, 0.0]  # [roll, pitch, yaw]
    interface: "gmsl"
    channel: 0
    enabled: true
    
  # 前视广角摄像头
  front_wide:
    name: "front_wide"
    type: "camera"
    resolution: [3840, 2160]  # 8M
    fps: 30
    fov: 120
    position: [2.0, 0.0, 1.1]
    orientation: [0.0, 0.0, 0.0]
    interface: "gmsl"
    channel: 1
    enabled: true
    
  # 后视摄像头
  rear:
    name: "rear"
    type: "camera"
    resolution: [1920, 1536]  # 3M
    fps: 30
    fov: 100
    position: [-2.0, 0.0, 1.2]
    orientation: [0.0, 0.0, 180.0]
    interface: "gmsl"
    channel: 2
    enabled: true
    
  # 左前周视摄像头
  left_front:
    name: "left_front"
    type: "camera"
    resolution: [1920, 1536]  # 3M
    fps: 30
    fov: 100
    position: [1.5, 1.0, 1.0]
    orientation: [0.0, 0.0, 45.0]
    interface: "gmsl"
    channel: 3
    enabled: true
    
  # 右前周视摄像头
  right_front:
    name: "right_front"
    type: "camera"
    resolution: [1920, 1536]  # 3M
    fps: 30
    fov: 100
    position: [1.5, -1.0, 1.0]
    orientation: [0.0, 0.0, -45.0]
    interface: "gmsl"
    channel: 4
    enabled: true
    
  # 左后周视摄像头
  left_rear:
    name: "left_rear"
    type: "camera"
    resolution: [1920, 1536]  # 3M
    fps: 30
    fov: 100
    position: [-1.5, 1.0, 1.0]
    orientation: [0.0, 0.0, 135.0]
    interface: "gmsl"
    channel: 5
    enabled: true
    
  # 右后周视摄像头
  right_rear:
    name: "right_rear"
    type: "camera"
    resolution: [1920, 1536]  # 3M
    fps: 30
    fov: 100
    position: [-1.5, -1.0, 1.0]
    orientation: [0.0, 0.0, -135.0]
    interface: "gmsl"
    channel: 6
    enabled: true
    
  # 前环视摄像头
  front_fisheye:
    name: "front_fisheye"
    type: "camera"
    resolution: [1920, 1536]  # 3M
    fps: 30
    fov: 190
    position: [2.0, 0.0, 0.8]
    orientation: [0.0, -30.0, 0.0]
    interface: "gmsl"
    channel: 7
    lens_type: "fisheye"
    enabled: true
    
  # 后环视摄像头
  rear_fisheye:
    name: "rear_fisheye"
    type: "camera"
    resolution: [1920, 1536]  # 3M
    fps: 30
    fov: 190
    position: [-2.0, 0.0, 0.8]
    orientation: [0.0, -30.0, 180.0]
    interface: "gmsl"
    channel: 8
    lens_type: "fisheye"
    enabled: true
    
  # 左环视摄像头
  left_fisheye:
    name: "left_fisheye"
    type: "camera"
    resolution: [1920, 1536]  # 3M
    fps: 30
    fov: 190
    position: [0.0, 1.0, 0.8]
    orientation: [0.0, -30.0, 90.0]
    interface: "gmsl"
    channel: 9
    lens_type: "fisheye"
    enabled: true
    
  # 右环视摄像头
  right_fisheye:
    name: "right_fisheye"
    type: "camera"
    resolution: [1920, 1536]  # 3M
    fps: 30
    fov: 190
    position: [0.0, -1.0, 0.8]
    orientation: [0.0, -30.0, -90.0]
    interface: "gmsl"
    channel: 10
    lens_type: "fisheye"
    enabled: true

# ==================== LiDAR配置 ====================
lidars:
  main_lidar:
    name: "main_lidar"
    type: "lidar"
    model: "pandar64"  # 或 "velodyne_vlp32"
    channels: 64
    range: 200.0  # 最大探测距离(m)
    frequency: 10  # 扫描频率(Hz)
    points_per_second: 1152000
    horizontal_fov: 360.0
    vertical_fov: [-25.0, 15.0]
    position: [0.0, 0.0, 2.0]
    orientation: [0.0, 0.0, 0.0]
    interface: "ethernet"
    ip: "192.168.1.201"
    port: 2368
    data_port: 2369
    enabled: true
    
  front_lidar:
    name: "front_lidar"
    type: "lidar"
    model: "livox_mid360"
    channels: 1
    range: 100.0
    frequency: 10
    points_per_second: 240000
    horizontal_fov: 360.0
    vertical_fov: [-7.0, 52.0]
    position: [2.0, 0.0, 1.5]
    orientation: [0.0, 0.0, 0.0]
    interface: "ethernet"
    ip: "192.168.1.202"
    port: 56000
    enabled: false

# ==================== 雷达配置 ====================
radars:
  front_radar:
    name: "front_radar"
    type: "radar"
    model: "continental_ars430"
    range: 250.0  # 最大探测距离(m)
    azimuth_fov: 60.0
    elevation_fov: 15.0
    position: [3.5, 0.0, 0.5]
    orientation: [0.0, 0.0, 0.0]
    interface: "can"
    can_channel: 0
    can_id: 0x200
    enabled: true
    
  left_front_radar:
    name: "left_front_radar"
    type: "radar"
    model: "continental_ars430"
    range: 100.0
    azimuth_fov: 90.0
    elevation_fov: 15.0
    position: [1.5, 1.0, 0.5]
    orientation: [0.0, 0.0, 45.0]
    interface: "can"
    can_channel: 0
    can_id: 0x210
    enabled: true
    
  right_front_radar:
    name: "right_front_radar"
    type: "radar"
    model: "continental_ars430"
    range: 100.0
    azimuth_fov: 90.0
    elevation_fov: 15.0
    position: [1.5, -1.0, 0.5]
    orientation: [0.0, 0.0, -45.0]
    interface: "can"
    can_channel: 0
    can_id: 0x220
    enabled: true
    
  left_rear_radar:
    name: "left_rear_radar"
    type: "radar"
    model: "continental_ars430"
    range: 80.0
    azimuth_fov: 150.0
    elevation_fov: 15.0
    position: [-1.5, 1.0, 0.5]
    orientation: [0.0, 0.0, 135.0]
    interface: "can"
    can_channel: 1
    can_id: 0x230
    enabled: true
    
  right_rear_radar:
    name: "right_rear_radar"
    type: "radar"
    model: "continental_ars430"
    range: 80.0
    azimuth_fov: 150.0
    elevation_fov: 15.0
    position: [-1.5, -1.0, 0.5]
    orientation: [0.0, 0.0, -135.0]
    interface: "can"
    can_channel: 1
    can_id: 0x240
    enabled: true

