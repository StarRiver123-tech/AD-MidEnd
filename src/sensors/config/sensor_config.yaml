    type: "ultrasonic"
    range: [0.15, 5.0]
    position: [-3.8, -0.4, 0.3]
    orientation: [0.0, 0.0, -170.0]
    interface: "spi"
    spi_channel: 6
    enabled: true
    
  rear_right_2:
    name: "rear_right_2"
    type: "ultrasonic"
    range: [0.15, 5.0]
    position: [-3.8, -0.8, 0.3]
    orientation: [0.0, 0.0, -160.0]
    interface: "spi"
    spi_channel: 7
    enabled: true
    
  left_front:
