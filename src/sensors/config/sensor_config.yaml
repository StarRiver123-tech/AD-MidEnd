# ==================== CAN总线配置 ====================
can_bus:
  channel_0:
    name: "can0"
    interface: "socketcan"
    channel: "can0"
    bitrate: 500000
    enabled: true
    
  channel_1:
    name: "can1"
    interface: "socketcan"
    channel: "can1"
    bitrate: 500000
    enabled: true

# ==================== 整车信息配置 ====================
vehicle:
  # 车辆尺寸
  dimensions:
    length: 4.8  # 车长(m)
    width: 1.9   # 车宽(m)
    height: 1.5  # 车高(m)
    wheelbase: 2.9  # 轴距(m)
    
  # 车辆动力学参数
  dynamics:
    max_speed: 50.0  # 最大速度(m/s)
    max_acceleration: 5.0  # 最大加速度(m/s^2)
    max_deceleration: 8.0  # 最大减速度(m/s^2)
    max_steering_angle: 30.0  # 最大转向角(度)
    
  # CAN信号配置
  can_signals:
    vehicle_speed:
      can_id: 0x130
      start_bit: 0
      length: 16
      scale: 0.01
      offset: 0
      unit: "m/s"
      
    steering_angle:
      can_id: 0x131
      start_bit: 0
      length: 16
      scale: 0.1
      offset: -540.0
      unit: "deg"
      
    yaw_rate:
      can_id: 0x132
      start_bit: 0
      length: 16
      scale: 0.01
      offset: -327.68
      unit: "deg/s"
      
    longitudinal_accel:
      can_id: 0x133
      start_bit: 0
      length: 16
      scale: 0.01
      offset: -320.0
      unit: "m/s^2"
      
    lateral_accel:
      can_id: 0x134
      start_bit: 0
      length: 16
      scale: 0.01
      offset: -320.0
      unit: "m/s^2"
      
    gear_position:
      can_id: 0x135
      start_bit: 0
      length: 3
      scale: 1
      offset: 0
      unit: "enum"

# ==================== 座舱通信配置 ====================
cockpit:
  interface: "ethernet"
  ip: "192.168.2.100"
  port: 8000
  protocol: "tcp"
  enabled: true

# ==================== 数据同步配置 ====================
sync:
  # 同步模式: "software" | "hardware" | "hybrid"
  mode: "software"
  
  # 主时钟源
  master_clock: "lidar"  # lidar | gps | ptp
  
  # 时间容差(ms)
  time_tolerance: 10
  
  # 同步周期(ms)
  sync_period: 100
  
  # 传感器同步组
  sync_groups:
    perception_group:
      - "front_long"
      - "front_wide"
      - "main_lidar"
      - "front_radar"
      
    surround_group:
      - "left_front"
      - "right_front"
      - "left_rear"
      - "right_rear"
      - "left_front_radar"
      - "right_front_radar"
      - "left_rear_radar"
      - "right_rear_radar"
      
    parking_group:
      - "front_fisheye"
      - "rear_fisheye"
      - "left_fisheye"
      - "right_fisheye"
      - "ultrasonics"

# ==================== 数据预处理配置 ====================
preprocessing:
  # 图像预处理
  image:
    resize: [1920, 1080]  # 目标分辨率
    normalize: true
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    color_space: "rgb"
    
  # 点云预处理
  pointcloud:
    range_filter: [0.3, 200.0]  # 距离过滤范围(m)
    voxel_size: 0.1  # 体素大小(m)
    max_points: 100000
    
  # 雷达预处理
  radar:
    range_filter: [0.5, 250.0]
    velocity_filter: [-50.0, 50.0]
    
  # 超声波预处理
  ultrasonic:
    median_filter_size: 3
    outlier_threshold: 0.5

# ==================== 仿真配置 ====================
simulation:
  enabled: false
  dataset: "nuscenes"
  data_root: "/data/nuscenes"
  version: "v1.0-trainval"
  
  # 仿真传感器映射
  sensor_mapping:
    front_long: "CAM_FRONT"
    front_wide: "CAM_FRONT_LEFT"
    rear: "CAM_BACK"
    left_front: "CAM_FRONT_LEFT"
    right_front: "CAM_FRONT_RIGHT"
    left_rear: "CAM_BACK_LEFT"
    right_rear: "CAM_BACK_RIGHT"
    main_lidar: "LIDAR_TOP"
    front_radar: "RADAR_FRONT"
