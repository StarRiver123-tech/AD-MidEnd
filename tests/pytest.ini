# pytest配置文件
# 自动驾驶模块测试框架配置

[pytest]
# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试目录
testpaths = .

# 添加标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    simulation: 仿真测试
    regression: 回归测试
    slow: 慢速测试（需要较长时间运行）
    perception: 感知模块测试
    planning: 规划模块测试
    sensor: 传感器测试
    performance: 性能测试

# 忽略目录
norecursedirs = 
    .git
    .tox
    .env
    venv
    __pycache__
    *.egg
    build
    dist
    test_reports
    .pytest_cache

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 报告配置
addopts = 
    -v
    --tb=short
    --strict-markers
    --color=yes
    --code-highlight=yes

# 覆盖率配置（如安装pytest-cov）
# addopts = 
#     --cov=.
#     --cov-report=html:test_reports/coverage_html
#     --cov-report=xml:test_reports/coverage.xml

# 警告过滤器
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 环境变量
env =
    PYTHONPATH=.
    TEST_ENV=development
